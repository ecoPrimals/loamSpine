# LoamSpine Docker Compose
# Development and production deployment configurations

services:
  # ==========================================================================
  # LoamSpine Service
  # ==========================================================================
  loamspine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loamspine
    restart: unless-stopped
    ports:
      - "9001:9001"   # tarpc (primal-to-primal)
      - "8080:8080"   # JSON-RPC (external clients)
    volumes:
      - loamspine-data:/var/lib/loamspine/data
    environment:
      - LOAMSPINE_DATA_DIR=/var/lib/loamspine/data
      - LOAMSPINE_LOG_LEVEL=info
      - LOAMSPINE_TARPC_PORT=9001
      - LOAMSPINE_JSONRPC_PORT=8080
      - RUST_BACKTRACE=1
    networks:
      - ecoprimals
    healthcheck:
      test: ["CMD", "test", "-d", "/var/lib/loamspine/data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


# =============================================================================
# Networks
# =============================================================================
networks:
  ecoprimals:
    driver: bridge
    name: ecoprimals-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  loamspine-data:
    driver: local
    name: loamspine-data

