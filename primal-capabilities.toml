# LoamSpine Primal Capability Registry
# 
# Philosophy: "Each primal knows only itself. Everything else is discovered."
#
# LoamSpine advertises its capabilities for runtime discovery by other primals
# and discovers other primals' capabilities through a universal adapter (service registry).
#
# The service registry can be any RFC 2782 compliant system:
# - Songbird (reference implementation for ecoPrimals)
# - Consul
# - etcd  
# - Custom implementations

[registry]
version = "1.0.0"
discovery_protocol = "capability-based"
fallback_strategy = "best-available"

# =============================================================================
# LOAMSPINE - Permanence Layer & Selective Memory
# =============================================================================
[primals.loamspine]
name = "loamspine"
description = "Permanence layer providing selective memory and certificate management"
primary_role = "permanence"
version = "0.9.9"

capabilities = [
    # Core permanence capabilities
    "permanence",
    "selective-memory",
    "spine-management",
    "entry-chain",
    "hash-chain-verification",
    
    # Certificate management
    "certificate-management",
    "certificate-minting",
    "certificate-transfer",
    "certificate-loan",
    "certificate-verification",
    "certificate-provenance",
    
    # Proof generation
    "inclusion-proofs",
    "certificate-proofs",
    "provenance-proofs",
    "waypoint-anchoring",
    
    # Storage
    "persistent-storage",
    "spine-storage",
    "entry-storage",
    "certificate-storage",
    
    # Backup & Recovery
    "backup",
    "restore",
    "export",
    "import",
    "multi-spine-backup",
    
    # Integration capabilities
    "session-commit",
    "slice-checkout",
    "slice-return",
    "braid-commit",
    
    # Query capabilities
    "spine-query",
    "entry-query",
    "certificate-query",
    "proof-verification",
]

# RPC protocols
protocols = ["tarpc", "jsonrpc"]
# Development defaults only — production uses OS-assigned ports (0) or env vars.
# These values are overridden by TARPC_PORT / JSONRPC_PORT env vars, and
# the actual bound port is registered with the service registry at startup.
default_tarpc_port = 9001
default_jsonrpc_port = 8080
health_endpoint = "/health"  # JSON-RPC endpoint

# Service metadata
[primals.loamspine.metadata]
language = "rust"
rpc_style = "pure-rust"  # No gRPC, no protobuf, no C++
storage_backend = "redb"  # Pure Rust embedded database (default; sled optional)
zero_copy = true  # Uses `bytes` crate
unsafe_code = false  # Forbids unsafe code

# =============================================================================
# CAPABILITY DEPENDENCIES (What LoamSpine Discovers)
# =============================================================================

# LoamSpine discovers these capabilities at runtime (no hardcoding)
[dependencies]
# Optional capabilities that enhance functionality
optional = [
    "signing",                    # Signing service (capability-discovered)
    "verification",               # Signature verification (capability-discovered)
    "attestation",                # Operation attestation for waypoint operations (capability-discovered)
    "storage",                    # External storage (capability-discovered)
    "session-management",         # Session management (capability-discovered)
    "semantic-attribution",       # Semantic braids (capability-discovered)
]

# Required capabilities (must be available for full functionality)
required = []  # LoamSpine is self-contained, all optional

# =============================================================================
# DISCOVERY CONFIGURATION
# =============================================================================
[discovery]
# Discovery methods (in priority order)
methods = [
    "environment",        # Environment variables (LOAMSPINE_SIGNER_PATH, etc.)
    "service-registry",   # Service registry / universal adapter (Songbird, Consul, etcd, etc.)
    "mdns",              # Multicast DNS
    "local-binaries",    # ../bins/ directory
    "config-file",       # This file
    "fallback",          # Graceful degradation
]

# Note: "songbird" is aliased to "service-registry" for backward compatibility

# Service registry integration (universal adapter)
#
# Compatible with any RFC 2782 compliant service discovery system:
# - Songbird (reference implementation for ecoPrimals)
# - Consul
# - etcd
# - Custom implementations
service_registry_enabled = true
# Default endpoint for local development; override via LOAMSPINE_DISCOVERY_ENDPOINT.
# Production deployments discover the registry via DNS SRV (_discovery._tcp.local)
# or environment variables. This value is only used as a last-resort fallback.
service_registry_endpoint = "http://localhost:8082"

# Legacy Songbird fields removed in v0.8.0 (use service_registry_* instead)

# Cache settings
cache_enabled = true
cache_ttl_seconds = 300  # 5 minutes

# Retry settings
retry_attempts = 3
retry_delay_ms = 1000
timeout_seconds = 30

# Health check settings
health_check_enabled = true
health_check_interval_seconds = 30
health_check_timeout_seconds = 5

[discovery.preferences]
# Prefer local services when available
prefer_local = true

# Prefer healthy services
require_healthy = true

# Load balancing strategy
load_balance = "round-robin"  # or "random", "least-connections"

# Fallback behavior
fallback_to_any = true  # Use any available service if preferred not found

# =============================================================================
# SERVICE ADVERTISEMENT (What LoamSpine Advertises)
# =============================================================================
[advertisement]
# Automatically advertise to service registry on startup
auto_advertise = true

# Re-advertise interval (heartbeat)
heartbeat_interval_seconds = 60

# Include health status in advertisement
include_health = true

# Include capability list in advertisement
include_capabilities = true

# =============================================================================
# INTEGRATION EXAMPLES
# =============================================================================
# 
# Instead of hardcoding:
#   let beardog = connect("http://localhost:8081").await?;
#
# LoamSpine discovers by capability:
#   let registry = CapabilityRegistry::new();
#   if let Some(signer) = registry.get_signer().await {
#       let signature = signer.sign_boxed(data).await?;
#   }
#
# With service registry integration (universal adapter):
#   let registry = ServiceRegistry::connect().await?;
#   let services = registry.discover_capability("signing").await?;
#   for service in services {
#       match try_connect(&service).await {
#           Ok(signer) => {
#               registry.register_signer(signer).await;
#               break;
#           }
#           Err(e) => warn!("Service {} unavailable: {}", service.name, e),
#       }
#   }
#
# Benefits:
# - Zero primal hardcoding (knows only itself)
# - Runtime discovery (infant learning model)
# - Automatic failover to alternatives
# - Load balancing across instances
# - Health-aware routing
# - O(n) complexity instead of O(n²)

# =============================================================================
# ENVIRONMENT VARIABLE OVERRIDES
# =============================================================================
# 
# All settings can be overridden via environment variables:
#
# LOAMSPINE_TARPC_PORT=9001
# LOAMSPINE_JSONRPC_PORT=8080
# LOAMSPINE_SIGNER_PATH=../bins/beardog
# LOAMSPINE_STORAGE_PATH=./data
# LOAMSPINE_DISCOVERY_ENDPOINT=http://localhost:8082
# LOAMSPINE_DISCOVERY_METHODS=environment,service-registry,mdns
# LOAMSPINE_AUTO_ADVERTISE=true
#
# This allows zero-configuration deployment while maintaining flexibility.

