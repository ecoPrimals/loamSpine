# ─── Consumed Capabilities ─────────────────────────────────────────────
# What loamSpine calls on other primals (discovered at runtime).

[consumed.btsp]
required = false
description = "BTSP handshake-as-a-service (required when FAMILY_ID is set)"

[consumed.signing]
required = false
description = "crypto.sign_ed25519 / crypto.verify_ed25519 via JSON-RPC"

[consumed.storage]
required = false
description = "External content-addressable storage (local redb is self-sufficient)"

[consumed.discovery]
required = false
description = "Service registry (mDNS / DNS-SRV / etcd) for primal discovery"

[consumed.attestation]
required = false
description = "Operation attestation for waypoint semantics"

[consumed.chain_anchor]
required = false
description = "External chain anchor submission (loamSpine only records receipts)"
