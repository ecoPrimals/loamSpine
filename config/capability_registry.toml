# loamSpine Capability Registry
# biomeOS-compatible runtime capability overlay.
# See: wateringHole SPRING_AS_NICHE_DEPLOYMENT_STANDARD
#
# biomeOS reads this file to discover loamSpine capabilities
# without requiring the primal to be running.

[primal]
name = "loamspine"
version = "0.9.16"
description = "Permanence layer — selective memory, certificates, inclusion proofs"
license = "AGPL-3.0-or-later"
protocol = "jsonrpc-2.0"
transport = ["uds", "tcp", "tarpc"]

# ─── Domain Declarations ───────────────────────────────────────────────

[domains.spine]
description = "Append-only spine lifecycle"
methods = ["create", "get", "list", "seal"]

[domains.entry]
description = "Content-addressed entry management"
methods = ["append", "get", "get_tip", "list"]

[domains.certificate]
description = "Loam Certificates — memory-bound objects (Novel Ferment Transcripts)"
methods = ["mint", "transfer", "loan", "return", "get"]

[domains.proof]
description = "Merkle inclusion proofs"
methods = ["generate_inclusion", "verify_inclusion"]

[domains.waypoint]
description = "Slice anchoring and checkout"
methods = ["anchor", "checkout"]

[domains.anchor]
description = "Public chain anchoring (Bitcoin, Ethereum, RFC 3161, Data Commons)"
methods = ["publish", "publish_batch", "verify"]

[domains.session]
description = "Provenance trio integration — DAG dehydration and commit"
methods = ["dehydrate", "commit"]

[domains.braid]
description = "Attribution braid integration (sweetGrass)"
methods = ["commit"]

[domains.bonding]
description = "Ionic bond ledger persistence"
methods = ["ledger.store", "ledger.retrieve", "ledger.list"]

[domains.trust]
description = "Cross-gate trust event anchoring (bearDog IPC)"
methods = ["anchor", "query", "event_count"]

[domains.btsp]
description = "BTSP Phase 3 secure transport negotiation"
methods = ["negotiate", "capabilities"]

[domains.health]
description = "Health, liveness, and readiness probes (bare 'health' also accepted)"
methods = ["check", "liveness", "readiness"]

[domains.lifecycle]
description = "Service lifecycle status"
methods = ["status"]

[domains.auth]
description = "JH-0 method gate introspection"
methods = ["check", "mode", "peer_info"]

[domains.capabilities]
description = "Capability discovery (Wire Standard L3)"
methods = ["list"]

[domains.identity]
description = "Primal identity"
methods = ["get"]

[domains.tools]
description = "MCP tool exposure for ecosystem orchestration"
methods = ["list", "call"]

[domains.permanence]
description = "Legacy naming compatibility layer"
methods = ["commit_session", "verify_commit", "get_commit", "health_check"]

[domains.primal]
description = "Primal self-registration"
methods = ["announce"]

# ─── Per-Operation Metadata ────────────────────────────────────────────
# Stability tiers: "stable" (Wire Standard locked), "beta" (API may evolve),
#                  "compat" (legacy naming, will be deprecated)

[operations."spine.create"]
depends_on = []
cost = "low"
stability = "stable"

