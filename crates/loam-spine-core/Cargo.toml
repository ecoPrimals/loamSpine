[package]
name = "loam-spine-core"
description = "Permanence Layer - Selective Memory & Certificates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Content addressing
blake3 = "1.5"

# UUIDs for identifiers
uuid = { version = "1.11", features = ["v7", "serde"] }

# Persistent storage (pure Rust embedded database)
sled = "0.34"

# Binary serialization for storage
bincode = "1.3"

# Zero-copy buffer management for network operations
bytes = "1.9"

# HTTP client for Songbird integration
reqwest = { version = "0.12", features = ["json"] }

[features]
default = []
# Enable testing utilities (MockSigner, MockVerifier) for use in downstream crates
testing = []

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
criterion = { version = "0.5", features = ["html_reports"] }
chrono = "0.4"

[[bench]]
name = "core_ops"
harness = false

[lints]
workspace = true
