[package]
name = "loam-spine-core"
description = "Permanence Layer - Selective Memory & Certificates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Content addressing
blake3 = "1.5"

# UUIDs for identifiers
uuid = { version = "1.11", features = ["v7", "serde"] }

# Persistent storage (pure Rust embedded database)
sled = "0.34"

# Binary serialization for storage
bincode = "1.3"

# Zero-copy buffer management for network operations
bytes = "1.9"
serde_bytes = "0.11"

# URL parsing (pure Rust, no C dependencies)
url = "2.5"

# HTTP client for service discovery — OPTIONAL, pulls ring (C/asm).
# Production path: Songbird via Tower Atomic (Pure Rust).
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }

# DNS resolution for service discovery
hickory-resolver = "0.24"


# mDNS for local network service discovery (optional, experimental)
mdns = { version = "3.0", optional = true }

[features]
default = []
# Enable testing utilities (MockSigner, MockVerifier) for use in downstream crates
testing = []
# Enable direct HTTP via reqwest (pulls ring C/asm — non-ecoBin).
# Use only for development or when Tower Atomic is unavailable.
discovery-http = ["dep:reqwest"]
# Enable Tower Atomic transport (Songbird/NeuralAPI via Unix socket JSON-RPC).
# This is the ecoBin-compliant production transport — zero C dependencies.
tower-atomic = []
# Enable mDNS local network service discovery (experimental)
mdns = ["dep:mdns"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
criterion = { version = "0.5", features = ["html_reports"] }
chrono = "0.4"
serial_test = { workspace = true }

[[bench]]
name = "core_ops"
harness = false

[lints]
workspace = true
