# Build configuration for LoamSpine.
#
# If your workspace is on a noexec mount (e.g. /mnt/4tb-work), override
# the target directory via environment variable:
#
#   CARGO_TARGET_DIR=~/.cargo-build/loamSpine/target cargo build
#
# Or uncomment and edit the line below for a persistent local override:
# [build]
# target-dir = "/home/youruser/.cargo-build/loamSpine/target"
